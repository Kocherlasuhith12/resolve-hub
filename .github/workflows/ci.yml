name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.6-alpine
        env:
          POSTGRES_USER: resolvehub
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: resolvehub_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U resolvehub -d resolvehub_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:8.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      RH_ENVIRONMENT: test
      RH_DATABASE_URL: postgresql+asyncpg://resolvehub:test-password@localhost:5432/resolvehub_test
      RH_TEST_DATABASE_URL: postgresql+asyncpg://resolvehub:test-password@localhost:5432/resolvehub_test
      RH_REDIS_URL: redis://localhost:6379/0
      RH_JWT_SECRET: integration-test-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy resolvehub tests
      - run: alembic upgrade head
      - run: alembic check
      - run: coverage run -m pytest
      - run: coverage report


# Render Blueprint Specification for ResolveHub
# https://render.com/docs/blueprint-spec

services:
  # 1. FastAPI Backend API Service
  - type: web
    name: resolvehub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health/live
    envVars:
      - key: RH_ENVIRONMENT
        value: production
      - key: RH_JWT_SECRET
        generateValue: true
      - key: RH_DATABASE_URL
        fromDatabase:
          name: resolvehub-db
          property: connectionString
      - key: RH_REDIS_URL
        fromService:
          type: redis
          name: resolvehub-redis
          property: connectionString
      - key: RH_SERVE_FRONTEND
        value: "false"
      - key: RH_STRIPE_SECRET_KEY
        sync: false
      - key: RH_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # 2. React Frontend Static Site
  - type: web
    name: resolvehub-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: resolvehub-api
          property: url

databases:
  # 3. PostgreSQL Database Instance
  - name: resolvehub-db
    plan: free
    databaseName: resolvehub
    user: resolvehub_user

# 4. Redis Cache Instance
  - type: redis
    name: resolvehub-redis
    plan: free
    ipAllowList: []
